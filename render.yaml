services:
  - type: web
    name: rentlogg-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: rentlogg-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_FILE
        value: /var/data/rentlogg.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
